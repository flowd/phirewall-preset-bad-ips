name: Bad-IP Update

on:
  schedule:
    # Daily at 05:15 UTC (ipsum regenerates roughly daily)
    - cron: '15 5 * * *'
  workflow_dispatch:
    inputs:
      level:
        description: 'ipsum confidence level to import (higher = fewer false positives)'
        required: false
        default: '3'

permissions:
  contents: write
  pull-requests: write

jobs:
  import:
    name: Import latest stamparm/ipsum snapshot
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Import bad-IP snapshot
        env:
          REQUESTED_LEVEL: ${{ inputs.level }}
        run: |
          php bin/badip-import --level="${REQUESTED_LEVEL:-3}"

      - name: Read snapshot date
        id: manifest
        run: |
          echo "imported=$(php -r 'echo json_decode(file_get_contents("resources/manifest.json"), true)["importedAt"];')" >> "$GITHUB_OUTPUT"

      - name: Run tests against the imported snapshot
        run: |
          XDEBUG_MODE=off vendor/bin/phpunit --no-coverage

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: badip-update
          commit-message: 'Update bad-IP snapshot (${{ steps.manifest.outputs.imported }})'
          title: 'Update bad-IP snapshot (${{ steps.manifest.outputs.imported }})'
          body: |
            Automated refresh of the stamparm/ipsum bad-IP snapshot.

            Generated by the scheduled `Bad-IP Update` workflow via `bin/badip-import`.
            Review the regenerated files under `resources/` before merging.
          add-paths: |
            resources/
          delete-branch: true
